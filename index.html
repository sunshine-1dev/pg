<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
.header h1{font-size:1.2rem;font-weight:600;letter-spacing:.5px;opacity:.9}
.btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.2)}
.btn svg{width:16px;height:16px}
.grid{columns:4 280px;column-gap:12px;padding:12px 12px 60px}
.grid .item{break-inside:avoid;margin-bottom:12px;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;background:#161616}
.grid .item img{width:100%;display:block;opacity:0;transition:opacity .5s ease}
.grid .item img.loaded{opacity:1}
.grid .item:hover{transform:scale(1.01);transition:transform .2s}
.grid .item::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 70%,rgba(0,0,0,.3));opacity:0;transition:opacity .3s}
.grid .item:hover::after{opacity:1}

/* Lightbox */
.lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s}
.lightbox.active{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background .2s;backdrop-filter:blur(4px)}
.lightbox .nav:hover{background:rgba(255,255,255,.25)}
.lightbox .prev{left:16px}
.lightbox .next{right:16px}
.lightbox .close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lightbox .close:hover{background:rgba(255,255,255,.25)}
.lightbox .counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:.85rem;opacity:.6}

/* Loading */
.loader{text-align:center;padding:40px;opacity:.5;display:none}
.loader.active{display:block}

/* Scroll to top */
.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .2s;z-index:50}
.scroll-top.visible{display:flex}
.scroll-top:hover{background:rgba(255,255,255,.2)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:640px){
  .grid{columns:2 160px;column-gap:8px;padding:8px 8px 40px}
  .grid .item{margin-bottom:8px;border-radius:8px}
  .header{padding:12px 16px}
  .header h1{font-size:1rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>Gallery</h1>
  <button class="btn" onclick="shuffleImages()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
    Shuffle
  </button>
</div>

<div class="grid" id="grid"></div>
<div class="loader" id="loader">Loading...</div>

<div class="lightbox" id="lightbox">
  <button class="close" onclick="closeLightbox()">✕</button>
  <button class="nav prev" onclick="navigateLightbox(-1)">‹</button>
  <button class="nav next" onclick="navigateLightbox(1)">›</button>
  <img id="lbImg" src="" alt="">
  <div class="counter" id="lbCounter"></div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const IMAGES = [
  "https://plus.unsplash.com/premium_photo-1664884884661-309d8ed2db8b?w=600&q=80",

  "https://plus.unsplash.com/premium_photo-1669795610306-8e0ac268b4e3?w=600&q=80",

  "https://plus.unsplash.com/premium_photo-1679522168406-6a6e9c67f235?w=600&q=80",
  "https://images.unsplash.com/photo-1604048208144-13ebe6fab471?w=600&q=80",
  "https://images.unsplash.com/photo-1604048476739-0fa9fb9be03e?w=600&q=80",
  "https://images.unsplash.com/photo-1603983616619-faf118d6c374?w=600&q=80",
  "https://plus.unsplash.com/premium_photo-1679522168383-698233d4af66?w=600&q=80",
  "https://images.unsplash.com/photo-1597787098356-ad9111c48ad0?w=600&q=80"
];

let currentOrder = [...IMAGES];
let visibleCount = 0;
const BATCH = 12;
let currentLbIndex = 0;
let visibleUrls = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function createItem(url, index) {
  const div = document.createElement('div');
  div.className = 'item';
  div.onclick = () => openLightbox(index);
  const img = document.createElement('img');
  img.loading = 'lazy';
  img.alt = '';
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => div.style.display = 'none';
  img.src = url;
  div.appendChild(img);
  return div;
}

function loadBatch() {
  const grid = document.getElementById('grid');
  const end = Math.min(visibleCount + BATCH, currentOrder.length);
  if (visibleCount >= currentOrder.length) return;
  
  for (let i = visibleCount; i < end; i++) {
    grid.appendChild(createItem(currentOrder[i], i));
    visibleUrls.push(currentOrder[i]);
  }
  visibleCount = end;
  
  document.getElementById('loader').className = visibleCount < currentOrder.length ? 'loader active' : 'loader';
}

function shuffleImages() {
  shuffle(currentOrder);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  visibleCount = 0;
  visibleUrls = [];
  loadBatch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Lightbox
function openLightbox(index) {
  currentLbIndex = index;
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lbImg');
  // Use full-size version
  img.src = currentOrder[index].replace('w=600', 'w=1200');
  document.getElementById('lbCounter').textContent = `${index + 1} / ${currentOrder.length}`;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navigateLightbox(dir) {
  currentLbIndex = (currentLbIndex + dir + currentOrder.length) % currentOrder.length;
  const img = document.getElementById('lbImg');
  img.src = currentOrder[currentLbIndex].replace('w=600', 'w=1200');
  document.getElementById('lbCounter').textContent = `${currentLbIndex + 1} / ${currentOrder.length}`;
  
  // Load more if navigating near end
  if (currentLbIndex >= visibleCount - 2) loadBatch();
}

// Click outside image to close
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
  if (e.key === 'ArrowRight') navigateLightbox(1);
});

// Infinite scroll
const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting) loadBatch();
}, { rootMargin: '400px' });

// Scroll to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  btn.classList.toggle('visible', window.scrollY > 600);
});

// Init
shuffle(currentOrder);
loadBatch();
observer.observe(document.getElementById('loader'));
</script>
</body>
</html>
